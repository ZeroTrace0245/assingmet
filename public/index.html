<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Greeting</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-wrap">
    <section class="card">
      <h1>Welcome</h1>
      <p class="subtitle">Please enter your name to receive a greeting.</p>

      <p id="error" class="error" hidden></p>

      <form method="POST" action="/submit" class="form-block">
        <label for="name" class="sr-only">Name</label>
        <input id="name" name="name" class="input" type="text" placeholder="Enter your name" required>
        <button type="submit" class="button">Get Greeting</button>
      </form>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const el = document.getElementById('error');
      el.hidden = false;
      el.textContent = error;
    }
  </script>
</body>
</html>
